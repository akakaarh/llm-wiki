            - heading "1. Why create a layer?" [level=1] [ref=e144]:
              - generic [ref=e145]: 1. Why create a layer?
            - paragraph [ref=e146]: The OpenEmbedded distribution comes with a set of layers that provide the different pieces of software used to build images.
            - paragraph [ref=e147]: "Checking the layers included in your distribution is easy with the bitbake-layers command tool:"
            - list [ref=e148]:
              - listitem [ref=e149]: "From your top directory, source your BitBake env setup (if not already done):"
            - generic [ref=e150]:
              - generic [ref=e151]: PC $>
              - text: source ./layers/meta-st/scripts/envsetup.sh
            - list [ref=e152]:
              - listitem [ref=e153]: "List your layers and priority:"
            - generic [ref=e154]:
              - generic [ref=e155]: PC $>
              - text: bitbake-layers show-layers layer path priority ========================================================================== meta /local/openstlinux-18-01-23/layers/openembedded-core/meta 5 meta-oe /local/openstlinux-18-01-23/layers/meta-openembedded/meta-oe 6 ...
            - paragraph [ref=e156]:
              - text: When you want to integrate or modify a distribution , the OpenEmbedded principle is to append modifications/addons in a dedicated place outside of the already available distribution layers.
              - text: This place is a new layer that you add to the distribution layers and feed with your modifications or add-ons. Hence the first thing to do when you want to integrate your modifications into a distribution is to create a new layer.
            - heading "2. How to proceed" [level=1] [ref=e157]:
