            - list [ref=e171]:
              - listitem [ref=e172]: "Display bitbake-layers help:"
            - generic [ref=e173]:
              - generic [ref=e174]: PC $>
              - text: "bitbake-layers --help NOTE: Starting bitbake server... usage: bitbake-layers [-d] [-q] [-F] [--color COLOR] [-h] <subcommand> ... BitBake layers utility optional arguments: -d, --debug Enable debug output -q, --quiet Print only errors -F, --force Force add without recipe parse verification --color COLOR Colorize output (where COLOR is auto, always, never) -h, --help Show this help message and exit subcommands: <subcommand> show-layers Show current configured layers show-overlayed List overlayed recipes (where the same recipe exists in another layer) show-recipes List available recipes, showing the layer by which they are provided show-appends List bbappend files and recipe files to which they apply show-cross-depends Show dependencies between recipes that cross layer boundaries add-layer Add a layer to bblayers.conf remove-layer Remove a layer from bblayers.conf flatten flatten layer configuration into a separate output directory layerindex-fetch Fetches a layer from a layer index along with its dependent layers, and adds them to conf/bblayers.conf layerindex-show-depends Find layer dependencies from layer index. create-layer Create a basic layer Use bitbake-layers <subcommand> --help to get help on a specific command"
