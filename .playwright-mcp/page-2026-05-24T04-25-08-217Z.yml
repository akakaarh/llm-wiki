              - text: .
            - list [ref=e716]:
              - listitem [ref=e717]:
                - text: The "source code" for the Developer Package software packages (
                - generic [ref=e718]: Linux
                - text: kernel, gcnano-driver,
                - generic [ref=e719]: U-Boot
