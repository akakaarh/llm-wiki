            - paragraph [ref=e614]:
              - text: OpenEmbedded is a build framework used to create
              - generic [ref=e615]: Linux
              - text: distributions for embedded devices, and is originally not a development environment. An OpenEmbedded companion utility named devtool aids in developing, building, and testing code that is going to be integrated into an image built using the OpenEmbedded build system.
            - paragraph [ref=e616]:
              - text: The
              - link "OpenEmbedded - devtool" [ref=e617] [cursor=pointer]:
                - /url: /stm32mpu/wiki/OpenEmbedded_-_devtool
              - text: article gives an overview of this tool, and introduces the way to add, modify and integrate new application or library in a distribution.
