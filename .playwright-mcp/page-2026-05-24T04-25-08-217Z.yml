                - link "OpenSTLinux distribution" [ref=e561] [cursor=pointer]:
                  - /url: /stm32mpu/wiki/OpenSTLinux_distribution
                - text: (take care of the compatibility between the value selected for DISTRO and the value targeted for <image>)
