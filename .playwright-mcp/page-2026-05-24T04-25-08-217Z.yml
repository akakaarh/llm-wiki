              - link "↑" [ref=e663] [cursor=pointer]:
                - /url: "#"
            - paragraph [ref=e664]: Now that either the OpenSTLinux distribution has been modified, or a new distribution has been created, it might be time to provide the developers with new Starter and Developer Packages, that are enriched with the additional or improved features of the new distribution.
            - paragraph [ref=e665]: "Prerequisites:"
            - list [ref=e666]:
              - listitem [ref=e667]:
                - text: It is assumed here that your recipes have been updated with patches that reflect changes you make to the source files, thanks to the
                - generic [ref=e668]:
                  - link "devtool update-recipe" [ref=e669] [cursor=pointer]:
                    - /url: /stm32mpu/wiki/OpenEmbedded_-_devtool#devtool_update-recipe
                    - text: devtool update-recipe
                  - text: command
              - listitem [ref=e670]:
                - text: So, either original recipes (.bb) have been modified with your changes, or recipes of your own layers (
                - link "How to create a new open embedded layer" [ref=e671] [cursor=pointer]:
                  - /url: /stm32mpu/wiki/How_to_create_a_new_open_embedded_layer
                - text: ) have been modified with your changes, so that the custom recipes (.bbappend) and your patches are clearly isolated from the original ones (recommended method to ease the maintenance)
            - list [ref=e672]:
              - listitem [ref=e673]:
                - text: Run the environment setup script; select, for DISTRO and MACHINE, the values for which you want to generate the Starter and Developer Packages (see
                - link "OpenSTLinux distribution" [ref=e674] [cursor=pointer]:
                  - /url: /stm32mpu/wiki/OpenSTLinux_distribution
                - text: for all possible values)
            - generic [ref=e675]:
              - generic [ref=e676]: PC $>
              - text: DISTRO=
              - generic [ref=e677]: <distro>
              - text: MACHINE=
              - generic [ref=e678]: <machine>
              - text: source layers/meta-st/scripts/envsetup.sh
            - paragraph [ref=e679]: "Example:"
            - generic [ref=e680]:
              - generic [ref=e681]: PC $>
              - text: DISTRO=openstlinux-weston MACHINE=stm32mp1 source layers/meta-st/scripts/envsetup.sh
            - list [ref=e682]:
              - listitem [ref=e683]:
                - text: Modify the build-<distro>-<machine>/conf/local.conf file to enable archiver for recipes that are configured to use it; the objective is to generate the "source code" software packages for the Developer Package (
                - generic [ref=e684]: Linux
                - text: kernel, gcnano-driver,
                - generic [ref=e685]: U-Boot
                - text: ","
                - generic [ref=e686]: TF-A
                - text: and
                - generic [ref=e687]: OP-TEE
                - generic [ref=e688]: OS
                - text: )
            - generic [ref=e689]: ST_ARCHIVER_ENABLE = "1"
            - table [ref=e691]:
              - rowgroup [ref=e692]:
                - row "Information" [ref=e693]:
                  - cell "Information" [ref=e694]
                - row "Take care to disable this configuration when you are not in the process of generating your own Starter and Developer Packages" [ref=e695]:
                  - cell "Take care to disable this configuration when you are not in the process of generating your own Starter and Developer Packages" [ref=e696]
            - list [ref=e697]:
              - listitem [ref=e698]:
                - text: Build the image to ensure that your last developments integrated in the distribution are reflected in the image, and to generate the "source code" software packages for the Developer Package; select, for <image>, the value for which you want to generate the Starter and Developer Packages (see
                - link "OpenSTLinux distribution" [ref=e699] [cursor=pointer]:
                  - /url: /stm32mpu/wiki/OpenSTLinux_distribution
                - text: for all possible values)
            - generic [ref=e700]:
              - generic [ref=e701]: PC $>
              - text: bitbake
              - generic [ref=e702]: <image>
              - text: "--runall=deploy_archives Example:"
              - generic [ref=e703]: PC $>
              - text: bitbake st-image-weston --runall=deploy_archives
            - table [ref=e705]:
              - rowgroup [ref=e706]:
                - row "Information" [ref=e707]:
                  - cell "Information" [ref=e708]
                - row "\"deploy_archives\" parameter is not normally required but without it the archives are not fully generated in some cases (so better add it by default)" [ref=e709]:
                  - cell "\"deploy_archives\" parameter is not normally required but without it the archives are not fully generated in some cases (so better add it by default)" [ref=e710]
            - list [ref=e711]:
              - listitem [ref=e712]:
                - text: The image (binaries) for the Starter Package are available in the
                - link "build-<DISTRO>-<MACHINE>/tmp-glibc/deploy/images/<machine> directory" [ref=e713] [cursor=pointer]:
                  - /url: "#Flashing_the_built_image"
            - paragraph [ref=e714]:
              - text: Note that the structure of this images/<machine> directory is obviously similar to the
              - link "directory structure of the Starter Package" [ref=e715] [cursor=pointer]:
