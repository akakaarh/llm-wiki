            - paragraph [ref=e553]:
              - text: BitBake is a core component of the
              - generic [ref=e554]: Yocto Project
              - text: and is used by the OpenEmbedded build system to build images. This build engine executes shell and Python tasks according to provided metadata stored in recipe (.bb), configuration (.conf), and class (.bbclass) files. The
              - link "BitBake cheat sheet" [ref=e555] [cursor=pointer]:
                - /url: /stm32mpu/wiki/BitBake_cheat_sheet
              - text: article introduces some BitBake command-line options, describes shortly the syntax of the recipes (.bb), and gives links towards standard documentation.
            - paragraph [ref=e556]: "Note that:"
            - list [ref=e557]:
