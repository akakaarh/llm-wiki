            - paragraph [ref=e604]: Now that the OpenSTLinux distribution is installed and built, let's customize it thanks to standard OpenEmbedded methods (e.g. creating a layer) and utilities (e.g. devtool).
            - heading "9.1. Creating a layer ↑" [level=3] [ref=e605]:
